// Calculate prize based on race grade (must be after RACE_GRADES)
const calculatePrizeMoney = (raceClass, position) => {
  const gradeInfo = RACE_GRADES[raceClass];
  if (!gradeInfo) return PRIZE_MONEY[position] || 0;
  
  const basePrize = gradeInfo.basePrize;
  if (position === 1) return basePrize;
  if (position === 2) return Math.floor(basePrize * 0.35);
  if (position === 3) return Math.floor(basePrize * 0.15);
  return 0;
};

// Calculate horse rating based on career performance
const calculateHorseRating = (horse) => {
  if (horse.career.races === 0) return 0; // Maiden
  
  const winRate = horse.career.wins / horse.career.races;
  const avgFinish = horse.form.length > 0 ? horse.form.reduce((a,b)=>a+b,0) / horse.form.length : 8;
  const recentForm = horse.form.slice(0, 3);
  const recentAvg = recentForm.length > 0 ? recentForm.reduce((a,b)=>a+b,0) / recentForm.length : 8;
  
  // Base rating from stats
  const baseRating = (horse.stats.speed + horse.stats.stamina) * 50;
  
  // Performance modifiers
  const winBonus = winRate * 30;
  const formPenalty = avgFinish * 3;
  const recentBonus = recentAvg <= 2 ? 15 : recentAvg <= 4 ? 5 : -5;
  
  const rating = Math.floor(baseRating + winBonus - formPenalty + recentBonus);
  return Math.max(0, Math.min(130, rating)); // Cap between 0-130
};

// Check if horse can enter race grade
const canEnterRace = (horse, raceClass) => {
  const gradeInfo = RACE_GRADES[raceClass];
  if (!gradeInfo) return true;
  
  const horseRating = calculateHorseRating(horse);
  
  // Maiden races - only unraced horses
  if (raceClass === "Maiden") {
    return horse.career.races === 0;
  }
  
  // Other races - check minimum rating
  return horseRating >= gradeInfo.minRating;
};

const drawOval=(ctx,x,y,w,h,color)=>{ ctx.save(); ctx.fillStyle=color; ctx.beginPath(); ctx.translate(x,y); ctx.scale(w/2,h/2); ctx.arc(0,0,1,0,Math.PI*2); ctx.fill(); ctx.restore(); };

const drawHorse = (ctx, x, y, scale, horse, time, isRunning) => {
  const { coat, silkColor } = horse;
  
  // Classic gallop animation - 8 frames
  const frame = isRunning ? Math.floor((time * 10) % 8) : 0;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath();
  ctx.ellipse(0, 68, 50, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Vertical bob during gallop
  let bobY = 0;
  if (isRunning) {
    bobY = [0, -3, -6, -8, -6, -3, 0, 2][frame];
  }
  ctx.translate(0, bobY);

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // Define leg positions for each animation frame
  let frontLeft = { x: 20, y: 65 };
  let frontRight = { x: 25, y: 65 };
  let backLeft = { x: -25, y: 65 };
  let backRight = { x: -20, y: 65 };
  
  if (isRunning) {
    const positions = [
      // Frame 0 - gathered
      { fl: {x: 15, y: 55}, fr: {x: 20, y: 57}, bl: {x: -15, y: 55}, br: {x: -10, y: 57} },
      // Frame 1 - extending forward
      { fl: {x: 30, y: 63}, fr: {x: 35, y: 65}, bl: {x: -25, y: 63}, br: {x: -20, y: 65} },
      // Frame 2 - full extension forward
      { fl: {x: 45, y: 65}, fr: {x: 50, y: 65}, bl: {x: -40, y: 65}, br: {x: -35, y: 65} },
      // Frame 3 - airborne gathered
      { fl: {x: 40, y: 50}, fr: {x: 45, y: 52}, bl: {x: -30, y: 50}, br: {x: -25, y: 52} },
      // Frame 4 - extending back
      { fl: {x: 25, y: 63}, fr: {x: 30, y: 65}, bl: {x: -30, y: 63}, br: {x: -25, y: 65} },
      // Frame 5 - full extension back
      { fl: {x: 10, y: 65}, fr: {x: 15, y: 65}, bl: {x: -45, y: 65}, br: {x: -40, y: 65} },
      // Frame 6 - gathering
      { fl: {x: 18, y: 60}, fr: {x: 23, y: 62}, bl: {x: -35, y: 60}, br: {x: -30, y: 62} },
      // Frame 7 - compressed
      { fl: {x: 20, y: 58}, fr: {x: 25, y: 60}, bl: {x: -20, y: 58}, br: {x: -15, y: 60} },
    ];
    
    const pos = positions[frame];
    frontLeft = pos.fl;
    frontRight = pos.fr;
    backLeft = pos.bl;
    backRight = pos.br;
  }

  // BACK LEGS (draw first for layering)
  ctx.strokeStyle = coat.body;
  ctx.lineWidth = 8;

  // Back left leg
  ctx.beginPath();
  ctx.moveTo(-28, 20);
  ctx.lineTo(-28, 40);
  ctx.lineTo(backLeft.x, backLeft.y);
  ctx.stroke();

  // Back right leg  
  ctx.beginPath();
  ctx.moveTo(-24, 20);
  ctx.lineTo(-24, 40);
  ctx.lineTo(backRight.x, backRight.y);
  ctx.stroke();

  // Hooves (back)
  ctx.fillStyle = "#0a0a0a";
  ctx.fillRect(backLeft.x - 5, backLeft.y, 10, 6);
  ctx.fillRect(backRight.x - 5, backRight.y, 10, 6);

  // BODY - horizontal elongated
  ctx.fillStyle = coat.body;
  ctx.beginPath();
  ctx.ellipse(0, 15, 55, 24, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly shading
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.beginPath();
  ctx.ellipse(0, 25, 50, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // HINDQUARTERS (muscular back)
  ctx.fillStyle = coat.body;
  ctx.beginPath();
  ctx.ellipse(-35, 15, 22, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  // CHEST (muscular front)
  ctx.fillStyle = coat.body;
  ctx.beginPath();
  ctx.ellipse(42, 12, 18, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  // TAIL - streaming behind
  ctx.strokeStyle = coat.mane;
  ctx.lineWidth = 7;
  const tailSwing = isRunning ? [0, -5, -10, -8, 0, 5, 10, 5][frame] : 0;
  ctx.beginPath();
  ctx.moveTo(-55, 15);
  ctx.bezierCurveTo(-70, 10 + tailSwing, -85, 20 + tailSwing, -95, 25 + tailSwing);
  ctx.stroke();

  ctx.lineWidth = 4;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(-55, 18);
  ctx.bezierCurveTo(-68, 13 + tailSwing, -83, 23 + tailSwing, -93, 28 + tailSwing);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // NECK - powerful arch
  ctx.fillStyle = coat.body;
  ctx.beginPath();
  ctx.moveTo(45, 10);
  ctx.bezierCurveTo(60, -5, 75, -8, 85, -2);
  ctx.bezierCurveTo(88, 8, 85, 18, 75, 20);
  ctx.bezierCurveTo(65, 18, 50, 18, 45, 15);
  ctx.closePath();
  ctx.fill();

  // Neck shading
  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.beginPath();
  ctx.moveTo(48, 13);
  ctx.bezierCurveTo(62, 0, 73, -3, 82, 2);
  ctx.bezierCurveTo(75, 10, 60, 15, 48, 16);
  ctx.closePath();
  ctx.fill();

  // MANE - flowing back
  ctx.strokeStyle = coat.mane;
  ctx.lineWidth = 5;
  const maneFlow = isRunning ? 12 : 6;
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.moveTo(50 + i * 6, 2 - i * 2);
    ctx.lineTo(48 + i * 6 - maneFlow, -8 - i * 3);
    ctx.stroke();
  }

  // HEAD - realistic horse head
  ctx.fillStyle = coat.body;
  
  // Main skull
  ctx.beginPath();
  ctx.ellipse(95, 2, 22, 15, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Muzzle/nose
  ctx.beginPath();
  ctx.ellipse(112, 8, 14, 10, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Lower jaw
  ctx.beginPath();
  ctx.ellipse(100, 15, 12, 8, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Nostril
  ctx.fillStyle = "#0a0a0a";
  ctx.beginPath();
  ctx.ellipse(120, 10, 3, 2.5, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(90, -3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.beginPath();
  ctx.arc(89, -4, 2, 0, Math.PI * 2);
  ctx.fill();

  // Ears - pointed forward
  ctx.fillStyle = coat.body;
  ctx.beginPath();
  ctx.moveTo(82, -12);
  ctx.lineTo(84, -22);
  ctx.lineTo(88, -13);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(88, -13);
  ctx.lineTo(89, -23);
  ctx.lineTo(93, -14);
  ctx.closePath();
  ctx.fill();

  // FRONT LEGS (draw on top)
  ctx.strokeStyle = coat.body;
  ctx.lineWidth = 8;

  // Front left leg
  ctx.beginPath();
  ctx.moveTo(30, 20);
  ctx.lineTo(30, 40);
  ctx.lineTo(frontLeft.x, frontLeft.y);
  ctx.stroke();

  // Front right leg
  ctx.beginPath();
  ctx.moveTo(34, 20);
  ctx.lineTo(34, 40);
  ctx.lineTo(frontRight.x, frontRight.y);
  ctx.stroke();

  // Hooves (front)
  ctx.fillStyle = "#0a0a0a";
  ctx.fillRect(frontLeft.x - 5, frontLeft.y, 10, 6);
  ctx.fillRect(frontRight.x - 5, frontRight.y, 10, 6);

  // JOCKEY - racing crouch
  ctx.save();
  ctx.translate(0, -5);

  // Saddle
  ctx.fillStyle = "#3d2817";
  ctx.beginPath();
  ctx.ellipse(0, 10, 22, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Saddle highlight
  ctx.strokeStyle = "#5d3827";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 8, 16, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // Jockey body - crouched low
  ctx.strokeStyle = silkColor;
  ctx.lineWidth = 10;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(2, 12);
  ctx.lineTo(12, -15);
  ctx.stroke();

  // Arms reaching forward
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(10, -10);
  ctx.lineTo(30, -18);
  ctx.stroke();

  // Helmet
  ctx.fillStyle = silkColor;
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(15, -20, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Helmet visor
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.beginPath();
  ctx.arc(18, -19, 5, -0.3, Math.PI + 0.3);
  ctx.fill();

  ctx.restore();

  // SADDLE NUMBER
  ctx.fillStyle = horse.isPlayer ? "#ffd700" : "#ffffff";
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.roundRect(-10, 3, 26, 20, 4);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "#000";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(horse.saddleNumber, 3, 13);

  ctx.restore();
};

          setXp(newXP-xpNeeded);
          return newLevel;
        }
        return currentLevel;
      });
      return newXP;
    });

      if(ach.id==="veteran_stable"&&playerStable.some(h=>h.career.races>=50))unlock=true;
      
      // Wealth achievements

      if(ach.id==="half_million"&&wallet>=500000)unlock=true;
      if(ach.id==="millionaire"&&wallet>=1000000)unlock=true;
      if(ach.id==="multi_millionaire"&&wallet>=5000000)unlock=true;
      if(ach.id==="tycoon"&&wallet>=10000000)unlock=true;
      if(ach.id==="prize_money"&&totalWins*20000>=100000)unlock=true; // Simplified prize tracking

  // Canvas setup
  useEffect(()=>{

      const rect=canvas.getBoundingClientRect();

  // Animation loop
  useEffect(()=>{

    const loop=(time)=>{
      if(!alive)return;
      animate(time);
      requestRef.current=requestAnimationFrame(loop);
    };
    requestRef.current=requestAnimationFrame(loop);
    return()=>{alive=false;cancelAnimationFrame(requestRef.current);};
  },[view]);
  
  const animate=(time)=>{
    const ctx=ctxRef.current;
    const canvas=canvasRef.current;
    if(!ctx||!canvas)return;
    
    const delta=lastTimeRef.current?Math.min((time-lastTimeRef.current)/16.667,3):1;
    lastTimeRef.current=time;
    
    const state=gsRef.current;
    if(!state.track)return;
    
    const W=canvas.width/(window.devicePixelRatio||1);
    const H=canvas.height/(window.devicePixelRatio||1);
    
    if(state.status==="RUN"){
      let leaderX=0;
      state.roster.forEach(h=>{
        if(h.finished)return;
        let groundBonus=1.0;
        if(h.groundPreference===state.track.going)groundBonus=1.05;
        else if((h.groundPreference==="Firm"&&state.track.going==="Heavy")||(h.groundPreference==="Heavy"&&state.track.going==="Firm"))groundBonus=0.95;
        
        let runStyleFactor=1.0,fatigueFactor=1.0;
        const distPct=h.x/state.track.distance;
        if(h.runStyle==="Front-Runner"){if(distPct<0.4)runStyleFactor=1.05;else fatigueFactor=1.1;}
        else if(h.runStyle==="Closer"){if(distPct<0.6)runStyleFactor=0.95;else fatigueFactor=0.9;}
        
        const fitnessMod=h.fitness/100;
        const energyMod=0.5+h.energy/200;
        const satietyMod=h.satiety>90?1-(h.satiety-90)*0.02:1;
        const jockeyBonus=h.jockey?h.jockey.skill:0.85;
        
        const baseSpeed=h.stats.speed*6.0*fitnessMod*satietyMod*jockeyBonus;
        const baseStamina=(1.2-h.stats.stamina)*energyMod;
        const fatigue=distPct**2*baseStamina*(1+state.track.furlongs/16)*fatigueFactor;
        const surge=Math.sin(time/100+h.raceId)*0.8+Math.random();
        let speed=(baseSpeed+surge-fatigue)*groundBonus*runStyleFactor;
        if(speed<1.5)speed=1.5;
        
        h.x+=speed*delta;
        if(h.x>leaderX)leaderX=h.x;
        
        if(state.particles.length<200&&Math.random()>0.7)state.particles.push({x:h.x-10,y:h.y+40,life:1.0,vx:-2-Math.random(),vy:-1-Math.random()});
        
        if(h.x>=state.track.distance){
          h.finished=true;
          if(h.finishRank===0){
            const taken=state.roster.filter(r=>r.finishRank>0).map(r=>r.finishRank);
            h.finishRank=taken.length?Math.max(...taken)+1:1;
          }
          h.x=state.track.distance;
        }
      });
      
      if(state.roster.length>0&&state.roster.every(h=>h.finished)&&!raceEndedRef.current){
        raceEndedRef.current=true;
        setTimeout(endRace,0);
      }
      
      if(Math.random()>0.85)SoundManager.playGallop();
      
      let targetCamX=leaderX-W*0.4;
      targetCamX=Math.max(0,Math.min(targetCamX,state.track.distance-W+150));
      state.cameraX+=(targetCamX-state.cameraX)*0.1;
    }else{
      state.cameraX=0;
    }
    
    // Render
    ctx.clearRect(0,0,W,H);
    const grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,state.track.sky[0]);
    grd.addColorStop(1,state.track.sky[1]);
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,H);
    
    for(let i=0;i<4;i++){const cx=((time/20+i*220)%(W+260))-130;drawOval(ctx,cx,30+i*10,90,32,"rgba(255,255,255,0.8)");}
    
    if(state.track.going==="Soft"||state.track.going==="Heavy"){
      ctx.strokeStyle="rgba(255,255,255,0.35)";
      ctx.lineWidth=1;
      state.rain.forEach(drop=>{
        drop.y=(drop.y+drop.speed*delta)%H;
        ctx.beginPath();
        ctx.moveTo(drop.x,drop.y);
        ctx.lineTo(drop.x+3,drop.y+10);
        ctx.stroke();
      });
    }
    
    ctx.fillStyle="#a5d6a7";
    ctx.beginPath();
    ctx.moveTo(0,H);
    for(let i=0;i<=W;i+=20)ctx.lineTo(i,H-120-Math.sin((i+state.cameraX*0.2)*0.01)*30);
    ctx.lineTo(W,H);
    ctx.fill();
    
    ctx.save();
    ctx.translate(-state.cameraX,0);
    const groundY=H-100;
    
    ctx.fillStyle=state.track.ground;
    ctx.fillRect(0,groundY,state.track.distance+1000,100);
    
    // Furlong poles and distance markers
    const furlongs = state.track.furlongs;
    const pixelsPerFurlong = state.track.distance / furlongs;
    
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    
    for (let f = 1; f <= furlongs; f++) {
      const poleX = f * pixelsPerFurlong;
      const remainingF = furlongs - f;
      
      // Furlong pole
      const poleGrad = ctx.createLinearGradient(poleX - 4, groundY - 100, poleX + 4, groundY - 100);
      poleGrad.addColorStop(0, "#000");
      poleGrad.addColorStop(0.5, "#fff");
      poleGrad.addColorStop(1, "#000");
      ctx.fillStyle = poleGrad;
      ctx.fillRect(poleX - 4, groundY - 120, 8, 60);
      
      // Colored pole top
      const poleColor = remainingF === 1 ? "#ff0000" : remainingF === 2 ? "#ffa500" : remainingF === 3 ? "#ffff00" : "#4169E1";
      ctx.fillStyle = poleColor;
      ctx.beginPath();
      ctx.arc(poleX, groundY - 120, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Distance text
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 4;
      ctx.font = "bold 18px Arial";
      ctx.strokeText(`${remainingF}f`, poleX, groundY - 130);
      ctx.fillText(`${remainingF}f`, poleX, groundY - 130);
    }
    
    // Finish line (checkered)
    const finishX = state.track.distance;
    ctx.fillStyle = "#000";
    for (let i = 0; i < 12; i++) {
      for (let j = 0; j < 2; j++) {
        if ((i + j) % 2 === 0) {
          ctx.fillRect(finishX - 20 + j * 20, groundY - 60 + i * 15, 20, 15);
        }
      }
    }
    ctx.fillStyle = "#fff";
    for (let i = 0; i < 12; i++) {
      for (let j = 0; j < 2; j++) {
        if ((i + j) % 2 === 1) {
          ctx.fillRect(finishX - 20 + j * 20, groundY - 60 + i * 15, 20, 15);
        }
      }
    }
    
    // FINISH banner
    ctx.save();
    ctx.translate(finishX, groundY - 140);
    ctx.fillStyle = "#000";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 5;
    ctx.font = "bold 32px Arial";
    ctx.strokeText("FINISH", 0, 0);
    ctx.fillText("FINISH", 0, 0);
    ctx.restore();
    
    // Starting gate
    const gateX = 80;
    ctx.fillStyle = "#c0c0c0";
    for (let i = 0; i < 8; i++) {
      ctx.strokeStyle = "#666";
      ctx.lineWidth = 3;
      ctx.strokeRect(gateX - 60, groundY - 70 + i * 18, 120, 18);
    }
    ctx.fillRect(gateX - 6, groundY - 75, 12, 80);
    
    ctx.fillStyle = "#000";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 4;
    ctx.font = "bold 24px Arial";
    ctx.strokeText("START", gateX, groundY - 85);
    ctx.fillText("START", gateX, groundY - 85);
    
    ctx.fillStyle="#374151";
    ctx.fillRect(0,groundY-80,state.track.distance+1000,40);
    for(let x=0;x<state.track.distance+1000;x+=10){
      ctx.fillStyle=`hsl(${(x/5)%360},40%,60%)`;
      ctx.fillRect(x,groundY-78+(x%3),4,6);
    }
    
    ctx.fillStyle=state.track.going==="Soft"||state.track.going==="Heavy"?"rgba(0,0,0,0.25)":"rgba(0,0,0,0.12)";
    for(let i=0;i<state.track.distance+1000;i+=20){
      ctx.beginPath();
      ctx.arc(i,groundY+20+Math.sin(i)*10,3,0,Math.PI*2);
      ctx.fill();
    }
    
    const railY=groundY-10;
    ctx.strokeStyle=state.track.fence;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(0,railY);
    ctx.lineTo(state.track.distance+500,railY);
    ctx.stroke();
    for(let i=0;i<state.track.distance+500;i+=40){
      ctx.beginPath();
      ctx.moveTo(i,railY);
      ctx.lineTo(i,railY+15);
      ctx.stroke();
    }
    
    ctx.fillStyle="#fff";
    ctx.font="12px Arial";
    ctx.textAlign="center";
    for(let f=1;f<state.track.furlongs;f++){
      const meterPos=f*FURLONG_METERS;
      ctx.fillRect(meterPos-2,railY,4,20);
      const label=f%8===0?`${f/8}m`:f>8?`${Math.floor(f/8)}m ${f%8}f`:`${f}f`;
      ctx.fillText(label,meterPos,railY-10);
    }
    
    ctx.strokeStyle="#d32f2f";
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.moveTo(state.track.distance,groundY-80);
    ctx.lineTo(state.track.distance,groundY+20);
    ctx.stroke();
    ctx.fillStyle="#d32f2f";
    ctx.fillRect(state.track.distance-40,groundY-100,80,25);
    ctx.fillStyle="#fff";
    ctx.font="bold 14px Arial";
    ctx.textAlign="center";
    ctx.fillText("FINISH",state.track.distance,groundY-82);
    
    state.particles=state.particles.filter(p=>{
      p.life-=0.04*delta;
      p.x+=p.vx*delta;
      p.y+=p.vy*delta;
      if(p.life<=0)return false;
      ctx.fillStyle=`rgba(93,64,55,${p.life})`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,2,0,Math.PI*2);
      ctx.fill();
      return true;
    });
    
    [...state.roster].sort((a,b)=>a.y-b.y).forEach(h=>{
      const depthScale=0.35+h.lane*0.025;
      drawHorse(ctx,h.x,h.y,depthScale,h,time/1000,state.status==="RUN");
    });
    
    ctx.restore();
    
    // Live distance display overlay
    if (state.status === "RUN" && state.roster.length > 0) {
      const leader = state.roster.reduce((prev, curr) => curr.x > prev.x ? curr : prev);
      const pixelsPerFurlong = state.track.distance / state.track.furlongs;
      const furlongsRun = leader.x / pixelsPerFurlong;
      const remaining = Math.max(0, state.track.furlongs - furlongsRun);
      
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.75)";
      ctx.fillRect(W - 210, 10, 200, 70);
      ctx.strokeStyle = "#fbbf24";
      ctx.lineWidth = 2;
      ctx.strokeRect(W - 210, 10, 200, 70);
      
      ctx.fillStyle = "#fff";
      ctx.font = "bold 14px Arial";
      ctx.textAlign = "left";
      ctx.fillText("TO GO:", W - 195, 32);
      
      ctx.fillStyle = "#fbbf24";
      ctx.font = "bold 36px Arial";
      ctx.fillText(`${Math.ceil(remaining)}f`, W - 195, 68);
      ctx.restore();
    }
  };
  
  const refreshAuction=useCallback((currentMaster)=>{
    // Determine available tiers based on level
    const availableTiers=[];
    
    // Budget horses always available (for new players)
    availableTiers.push("Budget");
    
    // Unlock better tiers as you level up
    if(level>=3)availableTiers.push("Starter");
    if(level>=8)availableTiers.push("Average");
    if(level>=15)availableTiers.push("Quality");
    if(level>=25)availableTiers.push("Elite");
    if(level>=35)availableTiers.push("Champion");
    if(level>=45)availableTiers.push("Legendary");
    
    // Filter horses and assign realistic pricing
    const forSale=[...currentMaster]
      .filter(h=>h.career.races<5) // Experienced horses worth less
      .sort(()=>0.5-Math.random())
      .slice(0,30) // Get more horses to filter from
      .map(h=>{
        // Determine tier based on stats
        const avgStat=(h.stats.speed+h.stats.stamina)/2;
        let tier="Budget";
        
        if(avgStat>=0.90)tier="Legendary";
        else if(avgStat>=0.85)tier="Champion";
        else if(avgStat>=0.75)tier="Elite";
        else if(avgStat>=0.65)tier="Quality";
        else if(avgStat>=0.55)tier="Average";
        else if(avgStat>=0.40)tier="Starter";
        else tier="Budget"; // <40% avg stats = Budget tier
        
        // Only show if tier is unlocked
        if(!availableTiers.includes(tier))return null;
        
        const tierInfo=HORSE_TIERS[tier];
        let basePrice=tierInfo.minPrice+(tierInfo.maxPrice-tierInfo.minPrice)*Math.random();
        
        // Price modifiers
        if(h.age<=3)basePrice*=1.2; // Young horses premium
        if(h.age>=6)basePrice*=0.7; // Older horses discount
        if(h.courage==="Fearless")basePrice*=1.1;
        if(h.temperament==="Bold")basePrice*=1.05;
        if(h.career.races>0)basePrice*=0.8; // Used horses cheaper
        
        return {...h,price:Math.floor(basePrice),tier,tierColor:tierInfo.color};
      })
      .filter(Boolean)
      .slice(0,8); // Show 8 horses
    
    setAuctionHorses(forSale);
  },[level]);

  const enterRace=useCallback((race,playerHorse)=>{
    // MUST have a jockey to race
    if(!playerHorse.jockey){
      setMsg(`⚠️ ${playerHorse.name} needs a jockey! Hire and assign one in the Jockeys tab.`);
      return;
    }
    
    // Cannot race if injured
    if(playerHorse.injury){
      setMsg(`⚠️ ${playerHorse.name} is injured (${playerHorse.injury.type})! Needs ${playerHorse.injury.weeksRemaining} weeks rest.`);
      return;
    }
    
    gainXP(XP_REWARDS.raceEnter);
    if(playerHorse.energy<50){setMsg(`${playerHorse.name} is too tired!`);return;}
    if(playerHorse.fitness<40){setMsg(`${playerHorse.name} is not fit enough!`);return;}
    
    const currentMaster=masterStableRef.current;
    const opponents=[...currentMaster].sort(()=>0.5-Math.random()).slice(0,7);
    
    const roster=[playerHorse,...opponents].map((h,i)=>{
      let prefBonus=1.0;
      if(h.groundPreference===race.going)prefBonus=1.25; // Increased from 1.2
      if((h.groundPreference==="Firm"&&race.going==="Heavy")||(h.groundPreference==="Heavy"&&race.going==="Firm"))prefBonus=0.75; // Worse penalty
      
      const fitnessMod=h.fitness/100;
      const energyMod=0.5+h.energy/200;
      const satietyMod=h.satiety>90?1-(h.satiety-90)*0.02:1;
      const happinessMod=1+(h.happiness-50)/500;
      
      // Jockey skill now has bigger impact (10-15% boost)
      const jockeySkill = h.jockey ? h.jockey.skill : 0.85;
      const jockeyBonus = 0.85 + (jockeySkill - 0.75) * 0.75; // Amplified impact
      
      const baseAbility=(h.stats.speed+h.stats.stamina)*prefBonus*fitnessMod*energyMod*satietyMod*happinessMod*jockeyBonus;
      let rating=Math.pow(baseAbility,3);
      
      // Use horse's official handicap weight (updated after each race)
      const weight = h.handicapWeight || 126;
      
      // Weight affects performance - each pound over base reduces performance by 1.5%
      const handicapBase = 126;
      const weightPenalty=1-(Math.max(0,weight-handicapBase)*0.015); // Tripled from 0.005
      const weightBonus=1+(Math.max(0,handicapBase-weight)*0.015); // Bonus for carrying less weight
      const weightEffect = weight > handicapBase ? weightPenalty : weightBonus;
      
      return{
        ...h,
        raceId:i,saddleNumber:i+1,
        isPlayer:i===0,lane:i,
        y:260+i*8,x:50,
        finished:false,finishRank:0,
        silkColor:SILKS[i%SILKS.length],
        jockey:h.jockey||{name:JOCKEYS[i%JOCKEYS.length],skill:0.85},
        rating:rating*weightEffect,
        weight:weight,
      };
    });
    
    const totalR=roster.reduce((a,b)=>a+b.rating,0);
    roster.forEach(h=>{
      const raw=(1/(h.rating/totalR))*0.85;
      h.odds=ODDS_TICKS.reduce((p,c)=>Math.abs(c-raw)<Math.abs(p-raw)?c:p);
    });
    
    const rain=Array.from({length:80},()=>({
      x:Math.random()*1400,
      y:Math.random()*400,
      speed:3+Math.random()*4,

    raceEndedRef.current=false;
    gsRef.current={roster,track:race,cameraX:0,status:"PRE",particles:[],rain};
    
    setView("RACE");
    setUiState("PRE");
    setMsg(`Entered ${race.name}. Place a bet!`);

    // Prize money based on race grade
    if(playerHorse && playerHorse.finishRank <= 3) {
      const prize = calculatePrizeMoney(state.track.class, playerHorse.finishRank);
      winnings += prize;
      
      // Prestige based on grade and finish position
      const gradeInfo = RACE_GRADES[state.track.class];
      if (gradeInfo) {
        const positionMultiplier = playerHorse.finishRank === 1 ? 1 : playerHorse.finishRank === 2 ? 0.5 : 0.25;
        prestigeEarned = Math.floor(gradeInfo.prestige * positionMultiplier);
      }
    }
    
    if(currentBet.id!==null&&currentBet.type!=="WATCH"){
      const myHorse=finishOrder.find(h=>h.raceId===currentBet.id);
      if(myHorse){
        if(currentBet.type==="WIN"&&myHorse.finishRank===1)winnings+=currentBet.amount*myHorse.odds+currentBet.amount;
        if(currentBet.type==="E/W"){
          if(myHorse.finishRank<=3)winnings+=currentBet.amount*(myHorse.odds/5)+currentBet.amount;
          if(myHorse.finishRank===1)winnings+=currentBet.amount*myHorse.odds;
        }
      }
    }
    
    setWallet(w=>w+winnings);
    if (prestigeEarned > 0) {
      setMsg(`Winner: ${winner.name}. You ${winnings>0?`won $${winnings.toLocaleString()} and +${prestigeEarned} prestige`:"won nothing"}!`);
    } else {
      setMsg(`Winner: ${winner.name}. You ${winnings>0?`won $${winnings.toLocaleString()}`:"won nothing"}!`);
    }
    
    // Track progression stats
    if(playerHorse){
      if(playerHorse.finishRank===1){
        setTotalWins(w=>w+1);
        setCurrentWinStreak(s=>s+1);
        const prestigeBonus=unlockedMilestones.includes(45)?100:50;
        setPrestige(p=>p+prestigeBonus+prestigeEarned);
        setDailyProgress(p=>({...p,wins:p.wins+1}));
        gainXP(XP_REWARDS.raceWin);
        if(playerHorse.bred)gainXP(XP_REWARDS.bredWin);
      }else if(playerHorse.finishRank===2){
        setCurrentWinStreak(0);
        setPrestige(p=>p+prestigeEarned);
        gainXP(XP_REWARDS.raceSecond);
      }else if(playerHorse.finishRank===3){
        setCurrentWinStreak(0);
        setPrestige(p=>p+prestigeEarned);
        gainXP(XP_REWARDS.raceThird);
      }else{
        setCurrentWinStreak(0);
      }
      if(winnings>biggestWin)setBiggestWin(winnings);
    }
    
    setRaceHistory(prev=>[{
      id:`rh-${Date.now()}`,
      track:state.track.name,going:state.track.going,
      winner:winner.name,
      myHorse:playerHorse?playerHorse.name:"None",
      myPos:playerHorse?playerHorse.finishRank:null,
    },...prev.slice(0,4)]);
    
    const updateStats=(h,res)=>{
      // Calculate handicap weight adjustment based on finish position
      let weightChange = 0;
      
      if (res.finishRank === 1) {
        // Winner: add 4-6 pounds
        weightChange = 4 + Math.floor(Math.random() * 3);
      } else if (res.finishRank === 2) {
        // Second: add 2-3 pounds
        weightChange = 2 + Math.floor(Math.random() * 2);
      } else if (res.finishRank === 3) {
        // Third: add 1-2 pounds
        weightChange = 1 + Math.floor(Math.random() * 2);
      } else if (res.finishRank >= 7) {
        // Last two: lose 2-3 pounds
        weightChange = -(2 + Math.floor(Math.random() * 2));
      } else if (res.finishRank >= 5) {
        // Mid-pack poor: lose 1 pound
        weightChange = -1;
      }
      // 4th place: no change
      
      const currentWeight = h.handicapWeight || 126;
      const newWeight = Math.max(118, Math.min(144, currentWeight + weightChange)); // Keep between 118-144 lbs
      
      // Injury chance (reduced if vet clinic owned)
      const hasVetClinic = facilities.some(f=>f.id==="vet");
      const injuryChance = hasVetClinic ? 0.05 : 0.10; // 5% with vet, 10% without
      
      let injury = h.injury;
      if (!injury && Math.random() < injuryChance) {
        const randomInjury = INJURIES[Math.floor(Math.random()*INJURIES.length)];
        injury = {...randomInjury, weeksRemaining: randomInjury.restWeeks};
        setMsg(`⚠️ ${h.name} sustained ${randomInjury.type}! Needs ${randomInjury.restWeeks} weeks rest.`);
      }
      
      return {
        ...h,
        career:{races:h.career.races+1,wins:res.finishRank===1?h.career.wins+1:h.career.wins},
        form:[res.finishRank,...h.form].slice(0,5),
        energy:10,fitness:Math.max(0,h.fitness-5),
        satiety:20,happiness:Math.max(0,h.happiness-10),
        handicapWeight: newWeight,
        injury: injury,
      };
    };
    
    setPlayerStable(prev=>prev.map(h=>{const r=finishOrder.find(fi=>fi.id===h.id);return r?updateStats(h,r):h;}));
    setMasterStable(prev=>prev.map(h=>{const r=finishOrder.find(fi=>fi.id===h.id);return r?updateStats(h,r):h;}));
  },[facilities]);

  const makeJockeyOffer=useCallback((jockey,monthlyOffer,contractMonths)=>{
    // Calculate jockey's expectations
    const minAcceptable=jockey.baseSalary*0.85; // Will consider 85% of base
    const idealSalary=jockey.baseSalary*1.2; // Wants 120% ideally
    
    // Factors affecting acceptance
    const offerRatio=monthlyOffer/jockey.baseSalary;
    const stablePrestige=prestige;
    const stableLevel=level;
    
    // Base acceptance chance
    let acceptanceChance=0;
    
    if(monthlyOffer<minAcceptable){
      // Insulting offer - almost always reject
      acceptanceChance=0.05;
    }else if(monthlyOffer>=idealSalary){
      // Generous offer - very likely to accept
      acceptanceChance=0.95;
    }else{
      // Proportional chance between min and ideal
      const range=idealSalary-minAcceptable;
      const position=monthlyOffer-minAcceptable;
      acceptanceChance=0.3+(position/range)*0.6; // 30-90% range
    }
    
    // Prestige bonus (elite jockeys care more about prestige)
    if(jockey.reputation==="Elite"){
      if(stablePrestige>=5000)acceptanceChance+=0.15;
      else if(stablePrestige<1000)acceptanceChance-=0.2;
    }
    
    // Level bonus
    if(stableLevel>=20)acceptanceChance+=0.1;
    
    // Contract length bonus (longer = more attractive)
    if(contractMonths>=12)acceptanceChance+=0.1;
    else if(contractMonths<=3)acceptanceChance-=0.1;
    
    // Cap between 0 and 1
    acceptanceChance=Math.max(0,Math.min(1,acceptanceChance));
    
    const accepted=Math.random()<acceptanceChance;
    
    if(accepted){
      const totalCost=monthlyOffer*contractMonths;
      if(wallet<totalCost){
        setOfferResponse({accepted:false,message:`Cannot afford contract! Need $${totalCost.toLocaleString()}`});
        return;
      }
      
      setWallet(w=>w-totalCost);
      setHiredJockeys(prev=>[...prev,{...jockey,monthlyPay:monthlyOffer,contractEnd:currentMonth+contractMonths}]);
      setAvailableJockeys(prev=>prev.filter(j=>j.id!==jockey.id));
      setOfferResponse({
        accepted:true,
        message:`${jockey.name} accepted! "${offerRatio>=1.2?'Excellent offer!':offerRatio>=1.0?'Fair deal.':'I need the work.'}" Paid $${totalCost.toLocaleString()} for ${contractMonths} months.`
      });
      gainXP(XP_REWARDS.hireJockey);
      setMsg(`Hired ${jockey.name}!`);
    }else{
      // Generate rejection message
      let rejectionMsg="";
      if(monthlyOffer<minAcceptable){
        rejectionMsg=`"That's insulting. I'm worth at least $${Math.floor(minAcceptable).toLocaleString()}/month."`;
      }else if(jockey.reputation==="Elite"&&stablePrestige<1000){
        rejectionMsg=`"Your stable lacks prestige. I need to ride for established operations."`;
      }else if(offerRatio<0.95){
        rejectionMsg=`"I appreciate the offer, but I need closer to $${jockey.baseSalary.toLocaleString()}/month."`;
      }else{
        rejectionMsg=`"I have other opportunities right now. Perhaps try again later."`;
      }
      
      setOfferResponse({
        accepted:false,
        message:`${jockey.name} declined. ${rejectionMsg}`
      });
    }
    
    setTimeout(()=>setOfferResponse(null),5000);
    setJockeyOffer(null);
  },[wallet,prestige,level,currentMonth]);

              return nextYear;

          // Schedule cup races for next month

          });
          
          setMsg(`New Month: ${MONTHS[nextMonth-1]} • Weather: ${newWeather}`);
          return nextMonth;
        });
        
        // Generate new regular races
        generateUpcomingRaces();
        return 1;
      }
      
      setMsg(`Week ${nextWeek}/4 • Weather: ${newWeather}`);
      return nextWeek;
    });
    
    // Generate new regular races weekly
    generateUpcomingRaces();
  },[generateUpcomingRaces]);

                <div>
                  <h2 className="text-2xl font-black">📰 Racing News</h2>
                  <p className="text-sm opacity-90">{MONTHS[currentMonth-1]} {currentYear}, Week {raceWeek}</p>
                </div>
                <div className="text-right">
                  <p className="text-sm opacity-90">Weather</p>
                  <p className="text-3xl font-black">
                    {currentWeather==="Clear"&&"☀️"}
                    {currentWeather==="Cloudy"&&"☁️"}
                    {currentWeather==="Light Rain"&&"🌧️"}
                    {currentWeather==="Heavy Rain"&&"⛈️"}
                    {currentWeather==="Sunny"&&"🌞"}
                  </p>
                  <p className="text-xs">{currentWeather}</p>
                </div>
              </div>
            </div>
            
            <div className="bg-white p-4 rounded-lg shadow-md border">
              <h2 className="text-xl font-black text-slate-800 mb-3">🔔 Latest Headlines</h2>
              {newsHeadlines.length===0?(
                <div className="space-y-2">
                  <div className="bg-gray-50 p-3 rounded border-l-4 border-blue-500">
                    <p className="font-bold text-sm">Welcome to Derby Tycoon!</p>
                    <p className="text-xs text-gray-600 mt-1">Build your stable and compete for championship glory</p>
                  </div>
                  <div className="bg-gray-50 p-3 rounded border-l-4 border-green-500">
                    <p className="font-bold text-sm">Weather: {currentWeather}</p>
                    <p className="text-xs text-gray-600 mt-1">
                      {currentWeather==="Heavy Rain"&&"Track conditions will be Heavy - favor stamina horses"}
                      {currentWeather==="Light Rain"&&"Soft going expected - good for versatile runners"}
                      {currentWeather==="Clear"&&"Perfect racing conditions - Firm going expected"}
                      {currentWeather==="Sunny"&&"Fast ground - sprinters will excel today"}
                      {currentWeather==="Cloudy"&&"Good ground conditions - balanced racing"}
                    </p>
                  </div>
                  <div className="bg-gray-50 p-3 rounded border-l-4 border-amber-500">
                    <p className="font-bold text-sm">Championships This Month</p>
                    <p className="text-xs text-gray-600 mt-1">
                      {scheduledCups.length>0?`${scheduledCups.map(c=>c.name).join(", ")} available now!`:"No major championships this month"}
                    </p>
                  </div>
                </div>
              ):(
                <div className="space-y-2">
                  {newsHeadlines.map((headline,idx)=>(
                    <div key={idx} className="bg-gray-50 p-3 rounded border-l-4 border-blue-500">
                      <p className="font-bold text-sm">{headline.title}</p>
                      <p className="text-xs text-gray-600 mt-1">{headline.content}</p>
                      <p className="text-[10px] text-gray-400 mt-1">{headline.date}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
            
            <div className="bg-white p-4 rounded-lg shadow-md border">
              <h2 className="text-xl font-black text-slate-800 mb-3">📊 Track Conditions</h2>
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-blue-50 p-3 rounded border border-blue-200">
                  <p className="text-xs text-gray-600">Weather</p>
                  <p className="text-lg font-black text-blue-900">{currentWeather}</p>
                </div>
                <div className="bg-green-50 p-3 rounded border border-green-200">
                  <p className="text-xs text-gray-600">Expected Going</p>
                  <p className="text-lg font-black text-green-900">
                    {currentWeather==="Heavy Rain"?"Heavy":currentWeather==="Light Rain"?"Soft":currentWeather==="Clear"||currentWeather==="Sunny"?"Firm":"Good"}
                  </p>
                </div>
                <div className="bg-amber-50 p-3 rounded border border-amber-200">
                  <p className="text-xs text-gray-600">Current Month</p>
                  <p className="text-lg font-black text-amber-900">{MONTHS[currentMonth-1]}</p>
                </div>
                <div className="bg-purple-50 p-3 rounded border border-purple-200">
                  <p className="text-xs text-gray-600">Season</p>
                  <p className="text-lg font-black text-purple-900">{getCurrentSeason(currentMonth)}</p>
                </div>
              </div>
            </div>
          </div>
        )}
        
        {view==="QUESTS"&&(
          <div className="space-y-4">
            <div className="bg-white p-4 rounded-lg shadow-md border">
              <h2 className="text-xl font-black text-slate-800 mb-3">🎯 Active Quests</h2>
              <div className="space-y-3">
                {activeQuests.map(quest=>(
                  <div key={quest.id} className={`p-4 rounded border ${completedQuests.includes(quest.id)?"bg-green-50 border-green-300":"bg-gray-50"}`}>
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <p className="font-black text-lg">{quest.name}</p>
                        <p className="text-sm text-gray-600">{quest.desc}</p>
                      </div>
                      {completedQuests.includes(quest.id)&&<span className="text-2xl">✅</span>}
                    </div>
                    <div className="flex justify-between items-center mt-3 pt-3 border-t">
                      <div className="text-xs text-gray-500">
                        <span className="font-bold">Reward:</span> 💰${quest.reward.toLocaleString()} • ⭐{quest.prestige} Prestige
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-white p-4 rounded-lg shadow-md border">
              <h2 className="text-xl font-black text-slate-800 mb-3">📊 Career Stats</h2>
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-gray-50 p-3 rounded border">
                  <p className="text-xs text-gray-500 font-bold">TOTAL WINS</p>
                  <p className="text-2xl font-black text-slate-800">{totalWins}</p>
                </div>
                <div className="bg-gray-50 p-3 rounded border">
                  <p className="text-xs text-gray-500 font-bold">WIN STREAK</p>
                  <p className="text-2xl font-black text-slate-800">{currentWinStreak}</p>
                </div>
                <div className="bg-gray-50 p-3 rounded border">
                  <p className="text-xs text-gray-500 font-bold">BIGGEST WIN</p>
                  <p className="text-2xl font-black text-green-600">${biggestWin.toLocaleString()}</p>
                </div>
                <div className="bg-gray-50 p-3 rounded border">
                  <p className="text-xs text-gray-500 font-bold">PRESTIGE</p>
                  <p className="text-2xl font-black text-amber-600">{prestige}</p>
                </div>
              </div>
            </div>
          </div>
        )}
        
        {view==="FACILITIES"&&(
          <div className="space-y-4">
            <div className="bg-white p-4 rounded-lg shadow-md border">
              <h2 className="text-xl font-black text-slate-800 mb-2">🏛️ Stable Facilities</h2>
              <p className="text-sm text-gray-600 mb-4">Permanent upgrades that benefit your entire stable</p>
              <div className="space-y-3">
                {STABLE_FACILITIES.map(facility=>{
                  const owned=facilities.some(f=>f.id===facility.id);
                  const currentLevel=PRESTIGE_LEVELS.filter(l=>prestige>=l.minPrestige).pop()||PRESTIGE_LEVELS[0];
                  const discount=currentLevel.level>=2?(currentLevel.level-1)*5:0;
                  const finalCost=Math.floor(facility.cost*(1-discount/100));
                  return(
                    <div key={facility.id} className={`p-4 rounded border ${owned?"bg-green-50 border-green-300":"bg-gray-50"}`}>
                      <div className="flex justify-between items-start mb-2">
                        <div className="flex items-center gap-3">
                          <div className="text-3xl">{facility.icon}</div>
                          <div>
                            <p className="font-black text-lg">{facility.name}</p>
                            <p className="text-sm text-gray-600">{facility.benefit}</p>
                          </div>
                        </div>
                        {owned&&<span className="text-2xl">✅</span>}
                      </div>
                      {!owned&&(
                        <div className="flex justify-between items-center mt-3 pt-3 border-t">
                          <div>
                            <p className="text-lg font-black text-green-600">${finalCost.toLocaleString()}</p>
                            {discount>0&&<p className="text-xs text-gray-500">({discount}% prestige discount)</p>}
                          </div>
                          <button onClick={()=>buyFacility(facility)} disabled={wallet<finalCost} className={`px-4 py-2 rounded font-bold ${wallet>=finalCost?"bg-green-600 text-white hover:bg-green-500":"bg-gray-300 text-gray-500 cursor-not-allowed"}`}>
                            Purchase
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="bg-white p-4 rounded-lg shadow-md border">
              <h2 className="text-xl font-black text-slate-800 mb-3">⭐ Prestige Levels</h2>
              <div className="space-y-2">
                {PRESTIGE_LEVELS.map(level=>{
                  const unlocked=prestige>=level.minPrestige;
                  const current=PRESTIGE_LEVELS.filter(l=>prestige>=l.minPrestige).pop()?.level===level.level;
                  return(
                    <div key={level.level} className={`p-3 rounded border ${current?"bg-amber-50 border-amber-300":unlocked?"bg-green-50 border-green-200":"bg-gray-50"}`}>
                      <div className="flex justify-between items-center">
                        <div>
                          <p className="font-bold">{level.name}</p>
                          <p className="text-xs text-gray-600">{level.benefits}</p>
                        </div>
                        <div className="text-right">
                          <p className="text-xs text-gray-500">{level.minPrestige} prestige</p>
                          {current&&<p className="text-xs font-bold text-amber-600">CURRENT</p>}
                          {unlocked&&!current&&<p className="text-xs font-bold text-green-600">UNLOCKED</p>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
        
        {view==="ACHIEVEMENTS"&&(
          <div className="space-y-4">
            {/* Achievement Progress Header */}
            <div className="bg-gradient-to-r from-amber-500 to-yellow-600 p-4 rounded-lg shadow-md text-white">
              <div className="flex justify-between items-center mb-2">
                <h2 className="text-2xl font-black">🎖️ Achievements</h2>
                <span className="text-xl font-bold">{unlockedAchievements.length}/{ACHIEVEMENTS.length}</span>
              </div>
              <div className="bg-white/20 rounded-full h-3 overflow-hidden">
                <div 
                  className="h-full bg-white transition-all duration-500"
                  style={{width:`${(unlockedAchievements.length/ACHIEVEMENTS.length)*100}%`}}
                />
              </div>
              <div className="flex justify-between mt-2 text-sm">
                <span>{Math.floor((unlockedAchievements.length/ACHIEVEMENTS.length)*100)}% Complete</span>
                <span>Total Rewards: ${ACHIEVEMENTS.filter(a=>unlockedAchievements.includes(a.id)).reduce((sum,a)=>sum+a.reward,0).toLocaleString()}</span>
              </div>
            </div>
            
            {/* Achievements by Category */}
            {["Starter","Racing","Championship","Stable","Wealth","Breeding","Progression","Jockey","Special"].map(category=>{
              const categoryAchs=ACHIEVEMENTS.filter(a=>a.category===category);
              const unlockedCount=categoryAchs.filter(a=>unlockedAchievements.includes(a.id)).length;
              
              return(
              <div key={category} className="bg-white p-4 rounded-lg shadow-md border">
                <div className="flex justify-between items-center mb-3">
                  <h3 className="text-lg font-black text-slate-800">{category} Achievements</h3>
                  <span className="text-sm font-bold text-gray-600">{unlockedCount}/{categoryAchs.length}</span>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {categoryAchs.map(ach=>{
                    const isUnlocked=unlockedAchievements.includes(ach.id);
                    return(
                    <div 
                      key={ach.id} 
                      className={`p-3 rounded border-2 transition ${isUnlocked?"bg-gradient-to-br from-green-50 to-emerald-50 border-green-400":"bg-gray-50 border-gray-200"}`}
                    >
                      <div className="flex items-start gap-3">
                        <div className="text-3xl">{isUnlocked?ach.icon:"🔒"}</div>
                        <div className="flex-1">
                          <div className="flex justify-between items-start">
                            <p className="font-bold text-sm">{ach.name}</p>
                            {isUnlocked&&<span className="text-xl">✅</span>}
                          </div>
                          <p className="text-xs text-gray-600 mt-1">{ach.desc}</p>
                          <div className="flex items-center gap-2 mt-2">
                            <span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold">
                              💰 ${ach.reward.toLocaleString()}
                            </span>
                            {isUnlocked&&(
                              <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold">
                                EARNED
                              </span>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  );})}
                </div>
              </div>
            )})}
          </div>
        )}
        
        {view==="RACE"&&(
          <div className="space-y-3">
            <canvas ref={canvasRef} className="w-full rounded-lg border border-gray-300 shadow-inner" style={{height:`${TRACK_HEIGHT}px`,display:"block"}}/>
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-center font-bold text-amber-800">{msg}</div>
            {uiState==="PRE"&&(
            <div className="bg-white rounded-lg border p-4 space-y-4">
              <h3 className="font-black text-slate-800 text-lg">
                {gsRef.current.track?.name} — {gsRef.current.track?.distanceStr} ({gsRef.current.track?.going})
              </h3>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1">BET ON</label>
                  <select value={bet.id??""} onChange={(e)=>setBet(b=>({...b,id:Number(e.target.value)}))} className="w-full border rounded px-2 py-1 text-sm">
                    {(gsRef.current.roster||[]).map(h=>(
                      <option key={h.raceId} value={h.raceId}>#{h.saddleNumber} {h.name} ({h.odds}s) {h.isPlayer?"⭐":""}</option>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1">STAKE ($)</label>
                  <input type="number" min={1} max={wallet} value={bet.amount} onChange={(e)=>setBet(b=>({...b,amount:Math.max(1,Number(e.target.value))}))} className="w-full border rounded px-2 py-1 text-sm"/>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1">BET TYPE</label>
                  <select value={bet.type} onChange={(e)=>setBet(b=>({...b,type:e.target.value}))} className="w-full border rounded px-2 py-1 text-sm">
                    <option value="WIN">Win</option>
                    <option value="E/W">Each Way</option>
                  </select>
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={startRace} className="flex-1 bg-green-600 text-white font-black py-3 rounded-lg hover:bg-green-500 transition flex items-center justify-center gap-2">▶ Place Bet & Start</button>
                <button onClick={watchRace} className="px-4 py-3 bg-slate-200 text-slate-700 font-bold rounded-lg hover:bg-slate-300 transition">Watch Only</button>
              </div>
              <div className="border-t pt-3">
                <div className="text-xs font-bold text-gray-500 mb-2 uppercase">Race Card - Handicap Weights</div>
                <div className="space-y-1">
                  {(gsRef.current.roster||[]).map(h=>(
                    <div key={h.raceId} className={`flex items-center gap-2 text-sm p-1 rounded ${h.isPlayer?"bg-yellow-50 border border-yellow-200":""}`}>
                      <div className="w-5 h-5 rounded-full flex-shrink-0" style={{background:h.silkColor}}/>
                      <span className="font-bold w-4 text-gray-500">#{h.saddleNumber}</span>
                      <span className={`flex-1 ${h.isPlayer?"font-black text-slate-800":"text-slate-600"}`}>{h.name} {h.isPlayer?"⭐":""}</span>
                      <span className="text-xs text-gray-400">{h.jockey.name}</span>
                      <span className="text-xs font-bold text-purple-700">{h.weight}lbs</span>
                      <span className="text-xs font-bold text-blue-700">{h.odds}s</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
            {uiState==="RUN"&&(
              <div className="bg-white rounded-lg border p-3">
                <div className="text-sm font-bold text-gray-500 mb-2">Live Positions</div>
                <div className="space-y-1">
                  {[...(gsRef.current.roster||[])].sort((a,b)=>b.x-a.x).map((h,i)=>(
                    <div key={h.raceId} className={`flex items-center gap-2 text-sm ${h.isPlayer?"font-black text-slate-800":"text-slate-600"}`}>
                      <span className="text-gray-400 w-4">{i+1}.</span>
                      <div className="w-4 h-4 rounded-full flex-shrink-0" style={{background:h.silkColor}}/>
                      <span>{h.name} {h.isPlayer?"⭐":""}</span>
                      {h.finished&&<span className="text-xs bg-green-100 text-green-700 px-1 rounded font-bold">FIN</span>}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {uiState==="FINISH"&&(
              <div className="bg-white rounded-lg border p-4 space-y-3">
                <h3 className="font-black text-slate-800 text-lg">🏁 Final Results</h3>
                <div className="space-y-1">
                  {results.map(h=>(
                    <div key={h.raceId} className={`flex items-center gap-3 p-2 rounded text-sm ${h.finishRank===1?"bg-yellow-50 border border-yellow-300 font-black":h.isPlayer?"bg-blue-50 border border-blue-200 font-bold":""}`}>
                      <span className="font-black text-lg w-6">{h.finishRank===1?"🥇":h.finishRank===2?"🥈":h.finishRank===3?"🥉":h.finishRank}</span>
                      <div className="w-5 h-5 rounded-full flex-shrink-0" style={{background:h.silkColor}}/>
                      <span className="flex-1">{h.name} {h.isPlayer?"⭐":""}</span>
                      <span className="text-xs text-gray-400">{h.jockey.name}</span>
                      {PRIZE_MONEY[h.finishRank]&&h.isPlayer&&<span className="text-xs font-bold text-green-600">+${PRIZE_MONEY[h.finishRank].toLocaleString()}</span>}
                    </div>
                  ))}
                </div>
                <button onClick={returnToHub} className="w-full py-3 bg-slate-800 text-white font-black rounded-lg hover:bg-slate-700 transition flex items-center justify-center gap-2">🏠 Return to Stable</button>
              </div>
            )}
          </div>
        )}
      </main>
      
      {showAchievementPopup&&<div className="fixed top-20 right-4 bg-green-600 text-white p-4 rounded-lg shadow-2xl animate-bounce z-50"><p className="font-black text-lg">{showAchievementPopup.icon} {showAchievementPopup.name}!</p><p className="text-sm">+${showAchievementPopup.reward.toLocaleString()}</p></div>}
      
      {showQuestPopup&&<div className="fixed top-40 right-4 bg-blue-600 text-white p-4 rounded-lg shadow-2xl animate-bounce z-50"><p className="font-black text-lg">🎯 {showQuestPopup.name}!</p><p className="text-sm">+${showQuestPopup.reward.toLocaleString()} • +{showQuestPopup.prestige} Prestige</p></div>}
      
      {showLevelUpPopup&&(
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
          <div className="bg-gradient-to-br from-amber-500 to-yellow-600 p-6 rounded-xl shadow-2xl max-w-sm w-full text-center animate-bounce">
            <div className="text-6xl mb-4">🌟</div>
            <h2 className="text-3xl font-black text-white mb-2">LEVEL UP!</h2>
            <div className="text-5xl font-black text-white mb-4">LEVEL {showLevelUpPopup.level}</div>
            <div className="bg-white/20 rounded-lg p-4 mb-4">
              <p className="text-white font-bold mb-2">Rewards:</p>
              <p className="text-2xl font-black text-white">💰 ${showLevelUpPopup.cash.toLocaleString()}</p>
              <p className="text-lg font-bold text-white">⭐ +10 Prestige</p>
            </div>
            {showLevelUpPopup.milestone&&(
              <div className="bg-white/30 rounded-lg p-4 border-2 border-white">
                <p className="text-sm font-bold text-white mb-1">🎊 MILESTONE UNLOCKED!</p>
                <p className="text-lg font-black text-white">{showLevelUpPopup.milestone.unlock}</p>
                <p className="text-sm text-white">{showLevelUpPopup.milestone.desc}</p>
                <p className="text-xl font-black text-white mt-2">+${showLevelUpPopup.milestone.cash.toLocaleString()}</p>
              </div>
            )}
          </div>
        </div>
      )}
      
      {activeProfile&&<HorseProfile horse={activeProfile} onClose={()=>setActiveProfile(null)} onBuy={view==="MARKET"?buyHorse:null} wallet={wallet}/>}
    </div>
  );
}

  </script>
  
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DerbyTycoon />);
    console.log('✅ Derby Tycoon loaded! Race bug FIXED!');
  </script>
</body>
</html>
